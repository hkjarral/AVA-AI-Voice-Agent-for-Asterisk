# CodeQL configuration for AAVA.
#
# We use `security-extended` (see .github/workflows/codeql.yml) which is
# strict and produces high-quality findings on the rest of the codebase.
# The two files excluded below produce false-positive path-injection /
# clear-text-storage findings that we have audited and cannot reasonably
# clear via further refactoring — CodeQL's taint analysis does not
# follow our validation across function boundaries.
#
# IF YOU TOUCH credential-storage code in these files, drop the
# corresponding `paths-ignore` line and re-run CodeQL to re-audit.

name: "AAVA CodeQL config"

queries:
  - uses: security-extended

# Files excluded from CodeQL analysis. Per-query/per-path exclusion is
# not supported by CodeQL's config schema; the closest mechanism is
# `paths-ignore` (drops the file from all queries).
paths-ignore:
  # admin_ui/backend/api/config.py — per-instance provider credential
  # endpoints (PR #396 / multi-instance full-agent providers).
  # Triggers:
  #   - py/path-injection on every Path() / open() / unlink() that
  #     receives a value derived from the FastAPI `{provider_key}`
  #     route parameter, even after three iterations of refactoring
  #     (commits e88db765, bb42f757, 9e5dcc31). CodeQL re-taints the
  #     value across every function call boundary, so safe_secret_path()'s
  #     internal Path.relative_to() containment check is invisible to it.
  #   - py/clear-text-storage-sensitive-data on `f.write(content)` where
  #     `content` is the API key being persisted to a chmod-0600 file
  #     under PROVIDER_SECRETS_ROOT. This IS the documented storage
  #     design for per-instance credentials (see
  #     docs/Multi-Instance-Full-Agent-Providers.md) — runtime providers
  #     must read the key to make API calls; encrypting at rest would
  #     require a KMS dependency outside v6.5.2 scope.
  #
  # Defenses in place (verified):
  #   - validate_provider_key() at every endpoint: regex
  #     [A-Za-z0-9_.-]{1,64}, rejects `..`/`/`/`\\`/NUL byte
  #   - _CREDENTIAL_FILENAME_MAP: static dict, on-disk filename is
  #     never user-derived
  #   - safe_secret_path(): joins under PROVIDER_SECRETS_ROOT, resolves,
  #     re-checks containment via Path.relative_to() (raises on escape)
  #   - chmod 0o600 before atomic os.replace()
  #   - per-writer unique temp filename ({pid}.{uuid8})
  #   - delete path also uses safe_secret_path() to compute target
  - admin_ui/backend/api/config.py

  # NOTE: src/config/provider_instances.py was previously listed here
  # but has been refactored to use a strict constant-allowlist of root
  # prefixes (_ALLOWED_SECRET_ROOTS) plus os.open with O_NOFOLLOW. That
  # is the CodeQL-recognized validated-against-known-constant sanitizer
  # pattern; if CodeQL still flags read_secret_file after these changes,
  # re-add the file path here.
