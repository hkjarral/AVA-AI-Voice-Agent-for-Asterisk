name: Catalog URL Check

# Verifies every model download URL in models_catalog.py is reachable.
# Catches the same class of breakage that produced issue #358 (typo'd HF path)
# and the broader audit that found 4 more dead links (Triangle104 deleted repo,
# Qwen official-vs-mirror split-file mismatches).
#
# Runs on:
#   - PRs that touch the catalog or the checker itself (fast feedback)
#   - Weekly on main (catches upstream repo deletions between PRs)
#   - Manual dispatch (sanity check on demand)

on:
  pull_request:
    paths:
      - "admin_ui/backend/api/models_catalog.py"
      - "scripts/check_catalog_urls.py"
      - ".github/workflows/catalog-url-check.yml"
  push:
    branches: [main]
    paths:
      - "admin_ui/backend/api/models_catalog.py"
      - "scripts/check_catalog_urls.py"
  schedule:
    # Sundays 06:00 UTC — quiet hour, low chance of overlap with weekday PRs
    - cron: "0 6 * * 0"
  workflow_dispatch:

jobs:
  check-urls:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write  # only used by the open-issue step on scheduled failure
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run catalog URL checker
        id: check
        run: |
          python scripts/check_catalog_urls.py | tee url_check_report.txt
        continue-on-error: true

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: catalog-url-report
          path: url_check_report.txt

      - name: Fail PR if any URL broke
        if: steps.check.outcome == 'failure' && github.event_name != 'schedule'
        run: |
          echo "::error::Catalog URL check failed. See report artifact for details."
          exit 1

      - name: Open tracking issue (scheduled run only)
        if: steps.check.outcome == 'failure' && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('url_check_report.txt', 'utf8');
            const title = 'Catalog URL check failed (scheduled run)';
            // De-dupe: don't open a second issue if one is already open
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'catalog-broken',
            });
            const body = [
              'The weekly catalog URL check found broken download links.',
              '',
              'Run: ' + context.payload.repository.html_url + '/actions/runs/' + context.runId,
              '',
              '```',
              report.trim().slice(-3000),
              '```',
            ].join('\n');
            if (existing.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing[0].number,
                body: body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                labels: ['catalog-broken', 'bug'],
                body: body,
              });
            }
